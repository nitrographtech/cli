<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nitrograph service discovery for agents">
  <defs>
    <style>
      .sans { font-family: "Inter Tight", "Aptos", "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
      .upper { letter-spacing: 1.6px; text-transform: uppercase; }
    </style>
    <filter id="heroShadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <filter id="terminalShadow" x="650" y="70" width="560" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#E5E4DE" stroke-width="1"/>
    </pattern>
    <linearGradient id="accentFade" x1="813" y1="90" x2="1194" y2="523" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4EA38" stop-opacity="0.32"/>
      <stop offset="0.56" stop-color="#C4EA38" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#C4EA38" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#0E0E10"/>

  <g filter="url(#heroShadow)">
    <rect x="0.5" y="0.5" width="1279" height="639" fill="#FAFAF7" stroke="#222222"/>
  </g>

  <rect width="1280" height="640" fill="url(#grid)" opacity="0.55"/>
  <circle cx="1104" cy="176" r="260" fill="url(#accentFade)"/>
  <circle cx="158" cy="566" r="170" fill="#C4EA38" opacity="0.08"/>

  <g class="mono upper" font-size="12" fill="#666666">
    <rect x="0" y="0" width="1280" height="57" fill="#FAFAF7" opacity="0.9"/>
    <line x1="0" y1="57" x2="1280" y2="57" stroke="#E5E4DE"/>
    <text x="32" y="35" fill="#0A0A0A" font-weight="700">NITROGRAPH</text>
    <text x="149" y="35">/ open source</text>
    <text x="933" y="35">V 0.5.1</text>
    <text x="1004" y="35">.</text>
    <text x="1025" y="35">MIT</text>
    <text x="1078" y="35">.</text>
    <circle cx="1112" cy="31" r="4" fill="#A8D428"/>
    <circle cx="1112" cy="31" r="8" fill="#C4EA38" opacity="0.2"/>
    <text x="1130" y="35" fill="#2A8A3E">API LIVE</text>
  </g>

  <g transform="translate(56 86)">
    <g class="mono upper" font-size="12">
      <rect x="0" y="-6" width="6" height="6" fill="#A8D428"/>
      <text x="18" y="0" fill="#666666">for the devs and agents shipping commerce</text>
    </g>

    <g class="sans" font-size="50" font-weight="700" letter-spacing="-1.5" fill="#0A0A0A">
      <text x="0" y="64">Tell your agent what you need.</text>
      <rect x="0" y="80" width="355" height="54" fill="#C4EA38"/>
      <text x="6" y="122">Pick who does it.</text>
      <text x="0" y="180">Get the result.</text>
    </g>

    <g class="mono" font-size="14" fill="#1A1A1A">
      <text x="0" y="226">Your agent searches 18,000 services, shows you</text>
      <text x="0" y="249">options with real pricing, and delivers the result.</text>
      <text x="0" y="272">You pick where your money goes.</text>
    </g>

    <g class="mono upper" font-size="11" fill="#1A1A1A">
      <rect x="0" y="303" width="148" height="33" fill="#C4EA38" stroke="#A8D428"/>
      <text x="14" y="324" fill="#0A0A0A" font-weight="700">$</text>
      <text x="30" y="324">npx nitrograph</text>

      <rect x="156" y="303" width="122" height="33" fill="#FFFFFF" stroke="#C9C8C0"/>
      <text x="170" y="324" fill="#0A0A0A" font-weight="700">18K+</text>
      <text x="209" y="324">services</text>

      <rect x="286" y="303" width="116" height="33" fill="#FFFFFF" stroke="#C9C8C0"/>
      <text x="300" y="324" fill="#0A0A0A" font-weight="700">x402</text>
      <text x="337" y="324">+</text>
      <text x="352" y="324" fill="#0A0A0A" font-weight="700">MPP</text>
    </g>
  </g>

  <g filter="url(#terminalShadow)" transform="translate(684 92)">
    <rect width="540" height="340" fill="#0E0E10" stroke="#1A1A1D"/>
    <rect width="540" height="42" fill="#141417"/>
    <line x1="0" y1="42" x2="540" y2="42" stroke="#1A1A1D"/>
    <circle cx="24" cy="21" r="5" fill="#3A3A3D"/>
    <circle cx="42" cy="21" r="5" fill="#3A3A3D"/>
    <circle cx="60" cy="21" r="5" fill="#3A3A3D"/>
    <text class="mono upper" x="397" y="25" fill="#7A7A78" font-size="11">~/agent . zsh</text>

    <g class="mono" font-size="13">
      <text x="18" y="73" fill="#7A7A78">o Nitrograph query:</text>
      <text x="171" y="73" fill="#C4EA38">lead generation</text>

      <text x="18" y="120" fill="#FFFFFF" font-weight="700">High-confidence results</text>

      <text x="18" y="154" fill="#7A7A78">1.</text>
      <text x="42" y="154" fill="#FFFFFF" font-weight="700">Hunter</text>
      <text x="97" y="154" fill="#7A7A78">-</text>
      <text x="113" y="154" fill="#A8D428">hunter</text>
      <text x="169" y="154" fill="#7A7A78">-</text>
      <text x="185" y="154" fill="#DCDCD2">$0.0116/call</text>
      <text x="36" y="177" fill="#7A7A78">Email finding, verification, and company enrichment for outreach.</text>

      <text x="18" y="215" fill="#7A7A78">2.</text>
      <text x="42" y="215" fill="#FFFFFF" font-weight="700">Clado</text>
      <text x="91" y="215" fill="#7A7A78">-</text>
      <text x="107" y="215" fill="#A8D428">clado</text>
      <text x="157" y="215" fill="#7A7A78">-</text>
      <text x="173" y="215" fill="#DCDCD2">$0.0097/call</text>
      <text x="36" y="238" fill="#7A7A78">People search, LinkedIn enrichment, deep research.</text>

      <text x="18" y="276" fill="#7A7A78">3.</text>
      <text x="42" y="276" fill="#FFFFFF" font-weight="700">Apollo</text>
      <text x="99" y="276" fill="#7A7A78">-</text>
      <text x="115" y="276" fill="#A8D428">apollo</text>
      <text x="173" y="276" fill="#7A7A78">-</text>
      <text x="189" y="276" fill="#DCDCD2">$0.0056/call</text>
      <text x="36" y="299" fill="#7A7A78">Sales intelligence with 275M+ contacts.</text>
    </g>
  </g>

  <g class="mono upper" font-size="11" fill="#666666">
    <rect x="0" y="582" width="1280" height="58" fill="#FAFAF7" opacity="0.9"/>
    <line x1="0" y1="582" x2="1280" y2="582" stroke="#E5E4DE"/>
    <circle cx="36" cy="611" r="4" fill="#A8D428"/>
    <circle cx="36" cy="611" r="8" fill="#C4EA38" opacity="0.2"/>
    <text x="54" y="615">github.com / nitrograph</text>
    <text x="873" y="615">nitrograph.com . headless . agent-native</text>
  </g>
</svg>
