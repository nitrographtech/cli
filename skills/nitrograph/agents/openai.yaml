interface:
  display_name: "Nitrograph"
  short_description: "Search engine for agent commerce"
  default_prompt: "Use Nitrograph as the search engine for agent commerce to find the best API/service for this task, inspect the top result, and show the task-aware call card with pricing, health, gotchas, and payment behavior."

dependencies:
  tools:
    - type: "mcp"
      value: "nitrograph"
      description: "Nitrograph service discovery MCP server"
      transport: "streamable_http"
      url: "https://api.nitrograph.com/mcp"

policy:
  allow_implicit_invocation: true
