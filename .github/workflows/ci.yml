name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: CLI answers --version
        run: node dist/index.js --version
      - name: MCP server lists all five tools over stdio
        run: |
          out=$( (printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'; sleep 2) | node dist/index.js serve )
          echo "$out" | grep -q nitrograph_discover
          echo "$out" | grep -q nitrograph_service_detail
          echo "$out" | grep -q nitrograph_invoke_service
          echo "$out" | grep -q nitrograph_report_outcome
          echo "$out" | grep -q nitrograph_report_pattern

  # Publish happens ONLY from a version tag pushed to this repo — the 0.5.7
  # incident (published from an untracked working tree, git left behind, next
  # publish would have silently dropped the invoke tool) must stay impossible.
  # Requires the NPM_TOKEN repo secret (npm automation token).
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Tag must match package.json version
        run: |
          pkg=$(node -p "require('./package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          test "$pkg" = "$tag" || { echo "tag v$tag != package.json $pkg"; exit 1; }
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
